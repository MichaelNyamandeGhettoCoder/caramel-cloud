<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // 1. Gate: Check login immediately. Use 'caramel_auth' to match your login.html
    if (sessionStorage.getItem('caramel_auth') !== 'true') {
      location.replace('/login.html'); // boots them out
    }
    
    // 2. Auto-lock: Remove auth when they leave/refresh
    addEventListener('pagehide', () => sessionStorage.removeItem('caramel_auth'));
    
    // 3. Extra: Kill auth if page loads from back/forward cache
    addEventListener('pageshow', (e) => {
      if (e.persisted && sessionStorage.getItem('caramel_auth') !== 'true') {
        location.replace('/login.html');
      }
    });
  </script>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caramel Cloud Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fdf2f8; color: #1f2937; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; }
    h1 { color: #be185d; font-size: 28px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .logout { margin-left: auto; background: #f3f4f6; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 18px; }
  .tabs { display: flex; gap: 8px; margin: 20px 0; border-bottom: 2px solid #fbcfe8; }
  .tab { padding: 12px 20px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-weight: 600; color: #6b7280; font-size: 15px; }
  .tab.active { color: #be185d; border-bottom-color: #ec4899; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
    label { display: block; font-weight: 600; margin: 15px 0 5px; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 12px; border: 2px solid #fbcfe8; border-radius: 8px; font-size: 15px; font-family: inherit; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #ec4899; }
    button { width: 100%; padding: 14px; background: linear-gradient(135deg, #ec4899, #db2777); color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 15px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  .product-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 2px solid #fbcfe8; }
  .product-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
  .product-header { display: flex; gap: 12px; align-items: center; }
  .product-info { flex: 1; }
  .product-name { font-weight: 700; color: #1f2937; }
  .product-price { color: #be185d; font-weight: 600; }
  .product-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn-small { flex: 1; padding: 8px; font-size: 14px; margin: 0; }
  .btn-edit { background: #3b82f6; }
  .btn-delete { background: #ef4444; }
    #upload-status, #pass-msg { margin-top: 10px; font-size: 14px; font-weight: 600; }
  .card { background: white; padding: 20px; border-radius: 12px; border: 2px solid #fbcfe8; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Caramel Cloud Admin <button class="logout" onclick="logout()" title="Logout">↪</button></h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('add')">Add Product</button>
      <button class="tab" onclick="switchTab('list')">Catalogue</button>
      <button class="tab" onclick="switchTab('settings')">Settings</button>
    </div>

    <div id="add" class="tab-content active">
      <input type="hidden" id="editIndex">
      <label>Product Name</label><input type="text" id="pname" placeholder="e.g., Vanilla Cake">
      <label>Price ($)</label><input type="number" id="pprice" placeholder="0.00" step="0.01">
      <label>Category</label>
      <select id="pcategory">
        <option value="">Select category</option><option>🎂 Cakes</option>
  💄Cosmestics</option><option><option>🎁 Gift Boxes</option>
      </select>
      <label>Product Photos</label><input type="file" id="pimages" multiple accept="image/*">
      <div style="font-size:13px;color:#6b7280;margin-top:5px">First image = main. Leave empty when editing to keep old images.</div>
      <button id="save-btn" onclick="saveProduct()">✨ Save Product</button>
      <div id="upload-status"></div>
    </div>

    <div id="list" class="tab-content"><div id="product-list"></div></div>

    <div id="settings" class="tab-content">
      <div class="card">
        <h3 style="margin-bottom:15px;color:#be185d">Change Admin Password</h3>
        <input type="password" id="newPass" placeholder="New password - min 4 characters">
        <button onclick="changePassword()">Update Password</button>
        <div id="pass-msg"></div>
      </div>
    </div>
  </div>

<script>
const PRODUCTS_KEY = 'caramel_products';
let products = JSON.parse(localStorage.getItem(PRODUCTS_KEY) || '[]');
let currentFiles = [];

if (sessionStorage.getItem('caramel_auth')!== 'true') window.location.href = '/login.html';
function logout() { sessionStorage.removeItem('caramel_auth'); window.location.href = '/login.html'; }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab).classList.add('active');
  if (tab === 'list') renderProducts();
}

document.getElementById('pimages').onchange = (e) => { currentFiles = Array.from(e.target.files); };

async function saveProduct() {
  const editIndex = document.getElementById('editIndex').value;
  const name = document.getElementById('pname').value.trim();
  const price = parseFloat(document.getElementById('pprice').value);
  const category = document.getElementById('pcategory').value;
  const statusEl = document.getElementById('upload-status');
  const saveBtn = document.getElementById('save-btn');

  if (!name ||!price ||!category) return alert('All fields required');
  const isEditing = editIndex!== '';
  const hasNewImages = currentFiles.length > 0;
  if (!isEditing &&!hasNewImages) return alert('Add at least 1 product image');

  saveBtn.disabled = true;
  statusEl.innerText = 'Uploading...';
  statusEl.style.color = '#3b82f6';

  try {
    let imageUrls = [];
    if (isEditing &&!hasNewImages) {
      imageUrls = products[parseInt(editIndex)].images;
    } else {
      for (let i = 0; i < currentFiles.length; i++) {
        statusEl.innerText = `Uploading image ${i+1}/${currentFiles.length}...`;
        const base64 = await toBase64(currentFiles[i]);
        const res = await fetch('/.netlify/functions/upload-image', {
          method: 'POST',
          body: JSON.stringify({ image: base64 })
        });
        const data = await res.json();
        if (!data.url) throw new Error(data.error || 'Upload failed');
        imageUrls.push(data.url);
      }
    }

    const product = { name, price, category, images: imageUrls, created: isEditing? products[parseInt(editIndex)].created : Date.now() };
    if (isEditing) products[parseInt(editIndex)] = product;
    else products.unshift(product);
    localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
    
    document.getElementById('pname').value = '';
    document.getElementById('pprice').value = '';
    document.getElementById('pcategory').value = '';
    document.getElementById('pimages').value = '';
    document.getElementById('editIndex').value = '';
    currentFiles = [];
    saveBtn.innerText = '✨ Save Product';
    statusEl.innerText = 'Saved!';
    statusEl.style.color = '#10b981';
    setTimeout(() => { statusEl.innerText = ''; switchTab('list'); document.querySelectorAll('.tab')[1].click(); }, 800);
  } catch (err) {
    statusEl.innerText = 'Error: ' + err.message;
    statusEl.style.color = '#ef4444';
  } finally {
    saveBtn.disabled = false;
  }
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
  });
}

function renderProducts() {
  const list = document.getElementById('product-list');
  if (products.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:#6b7280">No products yet. Add one!</div>';
    return;
  }
  list.innerHTML = products.map((p, i) => `
    <div class="product-card">
      <div class="product-header">
        <img src="${p.images[0]}" alt="${p.name}">
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-price">$${p.price.toFixed(2)}</div>
          <div style="font-size:13px;color:#6b7280">${p.category}</div>
        </div>
      </div>
      <div class="product-actions">
        <button class="btn-small btn-edit" onclick="editProduct(${i})">Edit</button>
        <button class="btn-small btn-delete" onclick="deleteProduct(${i})">Delete</button>
      </div>
    </div>
  `).join('');
}

function editProduct(i) {
  const p = products[i];
  document.getElementById('editIndex').value = i;
  document.getElementById('pname').value = p.name;
  document.getElementById('pprice').value = p.price;
  document.getElementById('pcategory').value = p.category;
  document.getElementById('save-btn').innerText = '💾 Update Product';
  switchTab('add'); document.querySelectorAll('.tab')[0].click(); window.scrollTo(0, 0);
}

function deleteProduct(i) {
  if (confirm(`Delete ${products[i].name}?`)) {
    products.splice(i, 1);
    localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
    renderProducts();
  }
}

async function changePassword() {
  const newPass = document.getElementById('newPass').value;
  const msg = document.getElementById('pass-msg');
  if (newPass.length < 4) { msg.innerText = 'Password must be at least 4 characters'; msg.style.color = '#ef4444'; return; }
  msg.innerText = 'Updating...'; msg.style.color = '#3b82f6';
  try {
    const res = await fetch('/.netlify/functions/change-password', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ newPassword: newPass })
    });
    if (res.ok) { msg.innerText = 'Password changed!'; msg.style.color = '#10b981'; document.getElementById('newPass').value = ''; }
    else throw new Error('Failed');
  } catch (err) { msg.innerText = 'Error: ' + err.message; msg.style.color = '#ef4444'; }
}

renderProducts();
</script>
</body>
</html>
