<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Caramel Cloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fdf2f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      border: 2px solid #fbcfe8;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 { color: #be185d; margin-bottom: 8px; font-size: 28px; }
    p { color: #6b7280; margin-bottom: 30px; font-size: 14px; }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #fbcfe8;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 15px;
    }
    input:focus { outline: none; border-color: #ec4899; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ec4899, #db2777);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #error { color: #ef4444; margin-top: 15px; font-size: 14px; font-weight: 600; min-height: 20px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Caramel Cloud</h1>
    <p>Admin Login</p>
    <input type="password" id="password" placeholder="Enter password" autofocus>
    <button id="loginBtn" onclick="login()">Login</button>
    <div id="error"></div>
  </div>

<script>
async function login() {
  const pass = document.getElementById('password').value;
  const err = document.getElementById('error');
  const btn = document.getElementById('loginBtn');
  
  if (!pass) {
    err.innerText = 'Enter password';
    return;
  }
  
  btn.disabled = true;
  err.innerText = 'Checking...';
  
  try {
    const res = await fetch('/.netlify/functions/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ password: pass })
    });
    
    if (res.ok) {
      sessionStorage.setItem('caramel_auth', 'true');
      window.location.href = '/admin.html';
    } else {
      err.innerText = 'Wrong password';
      document.getElementById('password').value = '';
    }
  } catch (e) {
    err.innerText = 'Error connecting to server';
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('password').addEventListener('keypress', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
